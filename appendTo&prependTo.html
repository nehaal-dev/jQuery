<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Keyboard Events</title>
</head>
<style>
    body {
        font-family: arial;
    }
    
    #box {
        padding: 10px;
        border: 3px solid rgb(194, 6, 6);
    }
    
    .boxbg {
        background: rgb(100, 233, 111);
    }
</style>

<body>
    <h1>jQuery Append & Prepend Methods</h1>

    <div id="box">
        <h2> Test Box</h2>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolor animi id quaerat inventore ullam dolores adipisci cum reprehenderit tempore.</p>
    </div> <br> <br>


    <button id="appendTo">AppendTo</button>
    <button id="prependTo">PrependTo</button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script>
        $(document).ready(function() {
            $("#appendTo").click(function() {
                $("<h2>Yahoo Baba</h2>").appendTo('#box');

            });
            $("#prependTo").click(function() {
                $("<h3>Nehal Khan</h3>").prependTo('#box');

            });



        });
    </script>

</body>

</html>
