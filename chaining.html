<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery CSS Methods </title>
</head>
<style>
    body {
        font-family: arial
    }
    
    #box {
        padding: 10px;
        border: 5px solid rgb(117, 3, 117);
        background-color: #a495da;
    }
</style>

<body>
    <h1>jQuery CSS Methods</h1>

    <div id="box">
        <h2> Test Box</h2>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolor animi id quaerat inventore ullam dolores adipisci cum reprehenderit tempore.</p>
    </div> <br> <br>
    <button id="animatebtn">Animate</button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script>
        $(document).ready(function() {
            $('#animatebtn').click(function() {
                $('#box').css({
                    "background": "pink",
                    "border": "dotted 10px green",
                    "color": "red"
                }).slideUp(2000).slideDown(2000);
            });


        });
    </script>

</body>

</html>
