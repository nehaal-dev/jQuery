<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Class method</title>
</head>
<style>
    body {
        font-family: arial
    }
    
    #box {
        padding: 10px;
        border: 3px solid rgb(250, 38, 38);
    }
    
    .first {
        background-color: tan;
    }
    
    .second {
        background-color: blue;
    }
</style>

<body>
    <h1>jQuerry Class Methods</h1>
    <div id="box">
        <h2>Test Box</h2>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Recusandae veniam laboriosam iste aut, eum iusto dolores quidem natus nesciunt, accusantium dolorem voluptate totam repudiandae repellat a voluptas! Earum, ducimus possimus.</p>
    </div>
    <br>
    <button id="addbutton">Add Class</button>
    <button id="removebutton">Remove Class </button>
    <button id="togglebutton">Toggle Class </button>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script>
        $('#addbutton').click(function() {
            $('#box,h1').addClass("first second");
        })
        $('#removebutton').click(function() {
            $('#box,h1').removeClass("  second");
        })
        $('#togglebutton').click(function() {
            $('#box').toggleClass("  second");
        })
    </script>

</body>

</html>
