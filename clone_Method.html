<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Keyboard Events</title>
</head>
<style>
    body {
        font-family: arial;
    }
    
    #box {
        padding: 10px;
        border: 3px solid rgb(194, 6, 6);
    }
    
    .boxbg {
        background: rgb(100, 233, 111);
    }
    
    #box2 {
        padding: 10px;
        border: 4px solid rgb(69, 30, 211);
        background: rgb(243, 123, 183);
    }
</style>

<body>
    <h1>jQuery clone Methods</h1>

    <div id="box">
        <h2> Test Box</h2>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolor animi id quaerat inventore ullam dolores adipisci cum reprehenderit tempore.</p>
    </div> <br> <br>

    <div id="box2">

        <p>This is another div</p>
    </div> <br> <br>


    <button id="clone">Clone</button>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script>
        $(document).ready(function() {
            $("#clone").click(function() {
                $("#box h2 ").clone().prependTo('#box2');
                $("#box p ").clone().appendTo('#box2');

            });



        });
    </script>

</body>

</html>
