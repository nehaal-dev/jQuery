<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #box {
        border: 7px solid saddlebrown;
        padding: 20px;
        background-color: #93ebb0;
    }
</style>

<body>


    <h1> hasClass method</h1>
    <div id="box" class="test">
        <h2>Test Box</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Temporibus beatae, esse animi doloribus dolore asperiores quas. Aliquid sunt reprehenderit earum placeat iste asperiores dignissimos. exercitationem ea totam, unde odit dolore?</p>
    </div><br><br>
    <button id="hasClass">has class</button>

</body>
</body>

</html>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>


<script>
    $(document).ready(function() {
        $('#hasClass').click(function() {
            console.log($('#box').hasClass('test'));

        });
    });
</script>

    hasClass(): check krta h ki koi class laga h ki nhi html ke div tag  ke sath <p class="test">this is justtext</p> agr uske class mil jati to return krta h true otherwise false return krta agr class nhi milta-->
