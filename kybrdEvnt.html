<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Keyboard Events</title>
</head>
<style>
#box1{
    box-sizing: content-box;
    width: 300px;
    height: 100px;
    padding: 40px;
    border:15px solid red
     ;
   

}

</style>
<body> 
    <h1>Yahoo Baba:jQuery Keyboard Events</h1>

    <div id="box1">
        <h2> Test Box</h2>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolor animi id quaerat inventore ullam dolores adipisci cum reprehenderit tempore.</p>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script>
        $(document).ready(function(){
            $('body').keypress(function(){
                $(this).css('background-color','orange');
            });
            $('body').keyup(function(){
                $(this).css('background-color','green');
            });
            $('body').keydown(function(){
                $(this).css('background-color','pink');
            });
           

        });
    </script>
    
</body>
</html>
