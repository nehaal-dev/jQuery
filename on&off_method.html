<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Keyboard Events</title>
</head>
<style>
    body {
        font-family: arial
    }
    
    #box {
        padding: 10px;
        border: 3px solid violet;
    }
    
    .boxbg {
        background: pink;
    }
</style>

<body>
    <h1>jQuery on() Methods</h1>
    <!-- on method =jab ek hi id pr ek se jyada event lagta h tab hum wha on method use krte -->
    <div id="box">
        <h2> Test Box</h2>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Dolor animi id quaerat inventore ullam dolores adipisci cum reprehenderit tempore.</p>
    </div> <br> <br>
    <button id="button">Remove Event</button>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <script>
        $(document).ready(function() {
            $("#box").on({
                "click": function() {
                    $(this).css("background", "green");
                },
                "mouseover": function() {
                    $(this).css("background", "pink");

                },
                "mouseout": function() {
                    $(this).css("background", "cyan");
                }
            });
            $('#button').click(function() {
                $("#box").off("mouseover mouseout")

            });
        });
    </script>

</body>

</html>
