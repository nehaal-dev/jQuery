<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position & offset method</title>
</head>
<style>
    #box {
        border: 7px solid saddlebrown;
        padding: 20px;
        background-color: #93ebb0;
        position: relative;
        /*( position:relative )->position  work according to its parent,parent ko position relative dene pr work krta  */
    }
</style>
<!-- ofset hame absolute postion deta h jaha se hmara document start horha h  -->

<body>
    <h1> position & offset method</h1>
    <div id="box">
        <h2>Test Box</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Temporibus beatae, esse animi doloribus dolore asperiores quas. Aliquid sunt reprehenderit earum placeat iste asperiores dignissimos. exercitationem ea totam, unde odit dolore?</p>
    </div><br><br>
    <button id="positionbtn">position</button>
    <button id="offsetbtn">offset</button>
</body>

</html>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>


<script>
    $('document').ready(function() {
        $('#positionbtn').click(function() {
            // console.log($('#box h2').position());
            var x = $('#box h2').position();
            console.log("Top: " + x.top + "Left:" + x.left);

        });
        $('#offsetbtn').click(function() {
            // console.log($('#box h2').offset());
            var x = $('#box h2').offset();
            //console.log("Top: " + x.top + "Left:" + x.left);

            //set position using offset of any tag like h2
            $('#box h2').offset({
                top: 100,
                left: 100
            });

        });


    });
</script>
