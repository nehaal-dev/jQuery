<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>width & Height method</title>
</head>
<style>
    #box {
        border: 7px solid saddlebrown;
        padding: auto;
    }
</style>

<body>
    <h1>Width & Height method</h1>
    <div id="box">
        <h2>Test Box</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Temporibus beatae, esse animi doloribus dolore asperiores quas. Aliquid sunt reprehenderit earum placeat iste asperiores dignissimos. exercitationem ea totam, unde odit dolore?</p>
    </div><br><br>
    <button id="widthbtn">width</button>
    <button id="heightbtn">Height</button>
</body>

</html>
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>


<script>
    $('document').ready(function() {
        $('#widthbtn').click(function() {
            $('#box').width("400px");
            console.log("width:" + $('#box').width());
            console.log("Innerwidth:" + $('#box').innerWidth());
            console.log("Outerwidth:" + $('#box').outerWidth());
            console.log("Outerwidth(true):" + $('#box').outerWidth(true));


        });
        $('#heightbtn').click(function() {
            $('#box').height("200px");

            console.log("height:" + $('#box').height());
            console.log("Innerheight:" + $('#box').innerHeight());
            console.log("Outerheight:" + $('#box').outerHeight());
            console.log("Outerheight(true):" + $('#box').outerHeight(true));


        });

    });
</script>
